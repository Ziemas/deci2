name: deci2load
sha1: cd8dca7ae952c639d9edadb9fb4c8b47c1a54445
options:
    # paths
    basename: deci2load
    target_path: in/DECI2LOAD.rom
    base_path: ../..
    
    asm_path: asm/deci2load
    src_path: src/deci2load
    asset_path: assets/deci2load
    build_path: build
    subalign: 4

    extensions_path: tools/splat_ext 
    symbol_addrs_path: config/deci2load/symbol_addrs.txt
    reloc_addrs_path: config/deci2load/reloc_addrs.txt
    undefined_funcs_auto_path: config/deci2load/undefined_funcs_auto.txt
    undefined_syms_auto_path:  config/deci2load/undefined_syms_auto.txt

    migrate_rodata_to_functions: True
    named_regs_for_c_funcs: False
    make_full_disasm_for_code: True

    # compiler 
    compiler: GCC
    platform: psx

    string_encoding: ASCII
    
    section_order: [".text", ".rodata", ".data", ".bss", ".sbss"]

segments:
    - name: main
      type: code
      start: 0x0
      vram: 0x0
      bss_size: 0x2e0
      subsegments:
        # .text
        - [0x0, c, deci2load]
        - [0x1690, asm, ilb_stub]
        - [0x1810, .rodata, deci2load]
        - [0x1a30, data, deci2load]

        # .sbss / .bss
        - { type: bss, vram: 0x1a60, name: deci2load }

    - [0x1a60]
        
