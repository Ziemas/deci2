name: deci2drp
sha1: 3cf0623a77b7a26a5bcfc4c485f13ac94bc6d22f
options:
    # paths
    basename: deci2drp
    target_path: in/DECI2DRP.rom
    base_path: ../..
    
    asm_path: asm/deci2drp
    src_path: src/deci2drp
    asset_path: assets/deci2drp
    build_path: build
    subalign: 4

    extensions_path: tools/splat_ext 
    symbol_addrs_path: config/deci2drp/symbol_addrs.txt
    reloc_addrs_path: config/deci2drp/reloc_addrs.txt
    undefined_funcs_auto_path: config/deci2drp/undefined_funcs_auto.txt
    undefined_syms_auto_path:  config/deci2drp/undefined_syms_auto.txt

    migrate_rodata_to_functions: True
    named_regs_for_c_funcs: False
    make_full_disasm_for_code: True

    # compiler 
    compiler: GCC
    platform: psx

    string_encoding: ASCII
    
    section_order: [".text", ".rodata", ".data", ".bss"]

segments:
    - name: main
      type: code
      start: 0x0
      vram: 0x0
      bss_size: 0x1d60
      subsegments:
        # .text
        - [0x0, c, deci2drp]
        - [0x1870, asm, ilb_stub]
        - [0x1950, .rodata, deci2drp]
        - [0x1c40, data, deci2drp]

        # .sbss / .bss
        - { type: bss, vram: 0x1cb0, name: deci2drp }

    - [0x1cb0]
        
